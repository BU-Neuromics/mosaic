id: https://w3id.org/hippo/hippo_ext
name: hippo_ext
title: Hippo Annotation Extension Vocabulary
description: >-
  Formal declaration of the hippo_* annotations consumed by Hippo's schema
  pipeline, DDL generators, validators, and typed client. Every hippo_*
  annotation used in any Hippo-managed schema MUST be declared here.
  See sec9 §9.4 of the Hippo design spec for the rationale.

  Modeling note: LinkML has no native metamodel for declaring a vocabulary
  of allowed annotation tags. This schema represents each hippo_*
  annotation as a `slot` — repurposing LinkML's slot declaration as the
  most natural container for (range, description, default, applicability).
  The `in_subset` assignment (`class_annotation` or `slot_annotation`)
  encodes the `applies_to` target. SchemaRegistry loads this schema as
  its annotation-validation authority; user schemas do not import these
  slots as data slots.

license: https://creativecommons.org/publicdomain/zero/1.0/
version: 0.1.0

prefixes:
  linkml: https://w3id.org/linkml/
  hippo: https://w3id.org/hippo/
default_prefix: hippo
default_range: string

imports:
  - linkml:types

#
# Subsets encode the applies_to constraint:
#   class_annotation — may attach to a class
#   slot_annotation  — may attach to a slot
#
subsets:
  class_annotation:
    description: Annotations that may attach to a class definition.
  slot_annotation:
    description: Annotations that may attach to a slot definition.

#
# Annotation declarations — one slot per hippo_* annotation.
#
slots:

  hippo_unique:
    description: >-
      Emit a single-column UNIQUE constraint for this slot at the
      storage layer. For composite uniqueness across multiple slots,
      use LinkML's native `unique_keys` on the class instead.
    range: boolean
    ifabsent: "false"
    in_subset:
      - slot_annotation

  hippo_index:
    description: >-
      Emit a single-column index for this slot. Adapters honor this
      annotation via their DDL shim; see sec9 §9.10.
    range: boolean
    ifabsent: "false"
    in_subset:
      - slot_annotation

  hippo_index_partial:
    description: >-
      When `hippo_index: true`, emit the index as partial with
      `WHERE is_available = 1`. Has no effect unless `hippo_index` is
      true on the same slot.
    range: boolean
    ifabsent: "false"
    in_subset:
      - slot_annotation

  hippo_search:
    description: >-
      Include this slot in a full-text search index of the declared
      mode. Current supported mode: `fts5` (SQLite). Adapters that do
      not support the requested mode fail at startup with a clear error.
    range: hippo_search_mode
    in_subset:
      - slot_annotation

  # hippo_append_only and hippo_accessor are declared by later changes
  # alongside their consumers:
  #   - hippo_append_only: introduced by `provenance-as-linkml-class` (Wave 2)
  #   - hippo_accessor:    introduced by `typed-client` (Wave 3)
  # See sec9 §9.12 for the schedule.

enums:
  hippo_search_mode:
    description: Supported full-text search modes.
    permissible_values:
      fts5:
        description: >-
          SQLite FTS5 full-text index. The only currently-supported mode.
          Additional modes will be added as adapters gain support.
