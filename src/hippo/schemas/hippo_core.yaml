id: https://w3id.org/hippo/hippo_core
name: hippo_core
title: Hippo Core Schema — Primitives
description: >-
  Hippo's built-in classes and enums declared as a LinkML schema. Every
  user schema imports `hippo_core`; every domain class uses `is_a: Entity`.
  `hippo_core` carries no domain knowledge — it is the minimal set of
  primitives the rest of the system needs to operate.

  See sec9 §9.5 of the Hippo design spec for the design rationale and
  `design/reference_hippo_core.md` for the per-class reference.

license: https://creativecommons.org/publicdomain/zero/1.0/
version: 0.5.0

prefixes:
  linkml: https://w3id.org/linkml/
  hippo: https://w3id.org/hippo/
  prov: http://www.w3.org/ns/prov#
default_prefix: hippo
default_range: string

imports:
  - linkml:types

#
# ---------------------------------------------------------------------------
# Classes
# ---------------------------------------------------------------------------
#
classes:

  Entity:
    abstract: true
    class_uri: prov:Entity
    description: >-
      Base class for every domain entity in a user schema. Provides the two
      system slots — `id` and `is_available` — that the SDK requires on every
      entity. Domain classes specialize via `is_a: Entity` and add their own
      slots.

      Temporal state (`created_at`, `updated_at`, `schema_version`) is NOT
      declared here — it is computed at read time from ProvenanceRecord per
      sec9 §9.7. Status transitions are recorded as ProvenanceRecord entries
      with an `availability_change` operation; the reason for unavailability
      lives in provenance, not on the entity (per sec9 §9.5).
    attributes:
      id:
        identifier: true
        range: string
        required: true
        description: >-
          Stable primary key. UUID-typed (SDK-assigned on create; opaque to
          callers). Per sec9 §9.5, the UUID invariant enables uniform
          polymorphic references across the system.
      is_available:
        range: boolean
        required: true
        ifabsent: "true"
        description: >-
          Lifecycle flag. `true` means the entity participates in normal
          reads; `false` means it has been superseded, archived, deleted,
          distributed, or removed. The reason lives in provenance, not on
          the entity.

  ProvenanceRecord:
    is_a: Entity
    class_uri: prov:Activity
    annotations:
      hippo_append_only: true
    description: >-
      Atomic audit record of an operation on an entity. `is_a: Entity` so
      it participates in the usual identity model (UUID id, lifecycle),
      but annotated `hippo_append_only: true` — adapters MUST reject
      UPDATE and DELETE on the backing table; only INSERT is permitted.

      PROV-O alignment: each instance is a `prov:Activity` at the atomic
      scale (composite activities are modeled by `Process`, which shares
      the same class_uri at a different granularity). Slot URIs map onto
      PROV-O predicates (wasGeneratedBy / wasInvalidatedBy / wasAssociatedWith /
      endedAtTime / wasDerivedFrom / wasInformedBy) per sec9 §9.6.

      Scope note (Decision 9.6.A): this change (`provenance-as-linkml-class`)
      declares ProvenanceRecord for introspection and downstream use
      (typed-client, REST surface). The actual storage migration — moving
      the legacy `provenance` table and `ProvenanceStore` implementation
      onto this shape — is scoped as a separate `provenance-migration`
      OpenSpec change.
    attributes:
      entity_id:
        range: string
        required: false
        description: >-
          UUID of the entity the operation targets. Null ONLY for system
          operations (`migration_applied`, `reference_data_installed`).
          For entity-scoped operations, points into the `_entity_registry`
          (relational adapters) or the user-schema entity by label (Neo4j).
        slot_uri: prov:wasGeneratedBy
        annotations:
          hippo_index: true
      entity_type:
        range: string
        required: false
        description: >-
          Fully-qualified class name of the target entity at write time.
          Denormalized onto the record so audit queries can avoid a
          registry lookup. Null when `entity_id` is null.
      operation:
        range: Operation
        required: true
        description: Kind of operation. See the `Operation` enum.
        annotations:
          hippo_index: true
      actor_id:
        range: string
        required: true
        description: >-
          UUID of the entity responsible for this operation. Resolves via
          the identity model (sec9 §9.5) to an agent — a user-schema
          `User`/`Service` class, a `Process` (for autonomous execution),
          or a system entity. Deployments that need rich actor modeling
          define their own agent classes; hippo_core prescribes only the
          reference.
        slot_uri: prov:wasAssociatedWith
      timestamp:
        range: datetime
        required: true
        description: >-
          UTC wall-clock time at which the operation completed.
        slot_uri: prov:endedAtTime
        annotations:
          hippo_index: true
      schema_version:
        range: string
        required: true
        description: >-
          Version of the merged schema at the moment of write. Captured by
          the SDK; never caller-supplied. Enables queries by schema
          version across migrations.
      derived_from_id:
        range: string
        required: false
        description: >-
          For `supersede` operations, UUID of the previous entity version.
        slot_uri: prov:wasDerivedFrom
      process_id:
        range: Process
        required: false
        description: >-
          Enclosing `Process` that contained this operation. Used to
          reconstruct multi-entity activities (reference loads, pipeline
          runs) from their atomic members. Null when the operation is not
          inside any Process.
        annotations:
          hippo_index: true
      patch:
        range: string
        required: false
        description: >-
          Operation-specific change payload as a JSON string. Shape
          varies by operation: diff for `update`, new value + driver
          `Status` for `availability_change`, `{slot, target_id}` for
          `relationship_add`/`_remove`, etc. Unstructured by design.
      context:
        range: string
        required: false
        description: >-
          Caller-supplied contextual metadata as a JSON string. Structure
          at the caller's discretion; Cappella conventions documented in
          sec6.

  Process:
    is_a: Entity
    class_uri: prov:Activity
    description: >-
      Composite activity — a grouping of atomic `ProvenanceRecord` entries
      under one logical execution. Reference-data loads, schema migrations,
      pipeline runs (Cappella), and other multi-entity operations emit a
      `Process` and associate their records with it via the record's
      `process_id` slot (Wave 2). `Process` `is_a: Entity` so it
      participates in the normal entity lifecycle (id, is_available,
      provenance); callers can `is_a: Process` their domain-specific
      activity classes (e.g., `PipelineRun is_a: Process`) to add
      parameters, input/output manifests, runtime metadata.

      `class_uri: prov:Activity` expresses PROV-O alignment. Atomic
      (ProvenanceRecord, Wave 2) and composite (Process) activities share
      the same PROV-O class URI — differing only in granularity, which
      matches PROV-O's treatment of activities at multiple scales.

      See sec9 §9.5 (class summary) and §9.6 (interaction with
      ProvenanceRecord).
    attributes:
      parent_process_id:
        range: Process
        required: false
        description: >-
          Self-reference for process composition. Processes form a tree
          (or DAG if a caller models shared dependencies). Null for root
          processes.
      operation_kind:
        range: string
        required: true
        description: >-
          Caller-defined categorization (e.g. `reference_data_installed`,
          `pipeline_run`, `schema_migration`, `manual_edit`). Not a closed
          enum — deployments categorize freely.
        annotations:
          hippo_index: true
      started_at:
        range: datetime
        required: true
        description: UTC wall-clock time at which the process began.
        annotations:
          hippo_index: true
      ended_at:
        range: datetime
        required: false
        description: >-
          UTC wall-clock time at which the process completed. Null while
          running or after failure without completion.
      actor_id:
        range: string
        required: true
        description: >-
          UUID of the entity responsible for initiating this process.
          Resolvable via `HippoClient.resolve_type(uuid)` per sec9 §9.5's
          identity model.

  Validator:
    description: >-
      Declarative validator definition. Instances are loaded from
      `validators.yaml` and validated against this class at load time.
      Placeholder — full slot inventory is finalized in a later OpenSpec
      change that reconciles this class with the existing validators.yaml
      shape. Until then, only `name` is declared.
    attributes:
      name:
        identifier: true
        range: string
        required: true

  ReferenceLoader:
    description: >-
      Metadata for a reference-data loader plugin. Instances are contributed
      by plugins registered under the `hippo.reference_loaders` entry point.

      Plugin registration contract (Decision 9.5.E): Hippo merges
      `schema_fragment` into the live SchemaView at plugin registration, then
      validates the ReferenceLoader instance against the merged view so
      `entity_type` references resolve. Either failure aborts registration
      with a single error path; partial state is not allowed. End users never
      see fragment or instance validation errors at runtime.

      `entity_type` semantics (Decision 9.5.F): the slot is declarative —
      used for provenance recording and discoverability only. Hippo does NOT
      drive runtime data-ingestion order from it. The loader's own code owns
      ingestion order (e.g., insert Substance rows before Reaction rows for
      FK satisfaction). See `design/reference_hippo_core.md` for the full
      developer contract.
    attributes:
      name:
        identifier: true
        range: string
        required: true
        description: >-
          Stable identifier for this loader. Used as the plugin name in
          registration error messages (`plugin <name> failed to register`).
      entity_type:
        range: string
        multivalued: true
        required: false
        description: >-
          Declarative list of entity class names this loader populates.
          Used for provenance (what classes did this loader touch?) and
          discoverability via SchemaRegistry.reference_loaders(). Does NOT
          drive runtime data-ingestion order — that is the loader's
          responsibility (Decision 9.5.F).
      source:
        range: string
        required: false
        description: >-
          URL, file path, or other locator identifying the origin of the
          reference data. Recorded in provenance; not interpreted by Hippo.
      schema_fragment:
        range: string
        required: false
        description: >-
          Inline LinkML schema YAML fragment contributed by this plugin.
          Merged into the live SchemaView at plugin registration before the
          ReferenceLoader instance is validated. Classes declared here are
          available for use in `entity_type` and in the user schema after
          registration (Decision 9.5.E).

  ExternalID:
    is_a: Entity
    description: >-
      A stable cross-system identifier linking a Hippo entity to an ID
      managed by an external source system (e.g., STARLIMS barcode, HALO
      sample ID, Donor DB donor number). Lifecycle-tracked: each
      ExternalID instance is created, superseded, and retired via the
      normal entity machinery — same write path, same provenance, same
      query semantics as any other entity class. See sec3 §3.4 and the
      β-refactor handoff (sec9 PR 1.1) for context.

      Note on lifecycle flags: `is_available` (inherited from Entity) is
      the standard entity-lifecycle flag that reflects soft-delete /
      supersede / archived state. `is_active` is a narrower flag meaning
      "this external-system mapping is currently in use". An ExternalID
      may be `is_available: true` (entity-level: not deleted) but
      `is_active: false` (mapping-level: superseded by a newer mapping).

      `(source_system, value)` must be unique within active records
      (`is_active = true`). The uniqueness constraint is declared here
      as a logical `unique_keys` block; the partial-index enforcement
      against `is_active = true` is wired in the DDL wrapper (PR 1.2).
    attributes:
      value:
        range: string
        required: true
        description: >-
          The identifier string as it appears in the source system.
        annotations:
          hippo_index: true
      source_system:
        range: string
        required: true
        description: >-
          Stable name of the originating system (e.g., "STARLIMS",
          "HALO", "DONOR_DB"). Controlled by deployers; not validated
          against an enum by hippo_core.
      entity:
        range: Entity
        required: true
        description: >-
          The Hippo entity this external ID belongs to. UUID reference;
          resolves via `_entity_registry` in relational adapters
          (Phase 2, PR 2.4).
      is_active:
        range: boolean
        required: true
        ifabsent: "true"
        description: >-
          Whether this external-system mapping is currently in use.
          Set to false when superseded by a newer ExternalID for the
          same source_system. Supersession is recorded via a
          ProvenanceRecord with operation `supersede`; the predecessor
          UUID is carried in `derived_from_id`. Distinct from
          `is_available`, which reflects entity-lifecycle state
          (soft-delete / archive / distribute).
    unique_keys:
      source_system_value_active:
        description: >-
          Within active records, a (source_system, value) pair must be
          unique. Partial-index enforcement (WHERE is_active = true)
          is added by the DDL wrapper in PR 1.2.
        unique_key_slots:
          - source_system
          - value

#
# ---------------------------------------------------------------------------
# Enums
# ---------------------------------------------------------------------------
#
enums:

  Status:
    description: >-
      Lifecycle state of an entity. Recorded in provenance via
      `availability_change` operations; not stored on the entity itself.
    permissible_values:
      active:
        description: Entity is live and participates in normal reads.
      archived:
        description: Entity retained but not available for active use.
      superseded:
        description: Entity replaced by another (pointer in provenance via derived_from_id).
      deleted:
        description: Soft-deleted. Data retained; is_available is false.
      distributed:
        description: Entity has been sent elsewhere (e.g., external distribution).
      removed:
        description: Entity has been physically removed (rare; normally superseded/deleted).

  Operation:
    description: >-
      Kind of operation recorded on a ProvenanceRecord. See sec9 §9.6.
    permissible_values:
      create:
        description: Entity created.
      update:
        description: Entity slot values modified in place.
      availability_change:
        description: is_available flag transitioned; new value + Status driver in patch.
      supersede:
        description: Entity superseded by another; derived_from_id carries the predecessor.
      relationship_add:
        description: A relationship slot gained a value; patch carries {slot, target_id}.
      relationship_remove:
        description: A relationship slot lost a value; patch carries {slot, target_id}.
      external_id_add:
        description: An ExternalID was associated with the entity.
      external_id_remove:
        description: An ExternalID was disassociated.
      migration_applied:
        description: A schema migration was applied (system event; entity_id is null).
      reference_data_installed:
        description: A reference loader installed data (system event; entity_id is null).
