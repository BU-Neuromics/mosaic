id: https://w3id.org/hippo/recipe_manifest
name: recipe_manifest
title: Hippo Recipe Manifest Schema
description: >-
  LinkML schema for the ``recipe.yaml`` manifest carried by every Hippo
  recipe. Defines ``RecipeManifest`` (the document a recipe author writes)
  and ``RecipeRef`` (the typed reference reused for ``parent``,
  ``requires.recipes[i]``, and entries in ``hippo_meta.installed_recipes``).

  Authoritative spec: ``design/sec10_recipes.md`` §10.3.2 (manifest fields)
  and §10.3.3 (RecipeRef shape). The handoff (``sec9_handoff_recipes_v1.md``)
  is the implementation directive.

  Closed-schema validation: this schema is consumed by ``SchemaRegistry`` +
  ``linkml.validator.Validator`` with ``closed=True``; every accepted field
  must be declared here.

license: https://creativecommons.org/publicdomain/zero/1.0/
version: 0.1.0

prefixes:
  linkml: https://w3id.org/linkml/
  hippo: https://w3id.org/hippo/
default_prefix: hippo
default_range: string

imports:
  - linkml:types

classes:

  RecipeManifest:
    tree_root: true
    description: >-
      The top-level ``recipe.yaml`` document. One instance per recipe.
      See sec10 §10.3.2 for the per-field semantics.
    attributes:
      id:
        identifier: true
        range: string
        required: true
        description: >-
          Reverse-DNS stable identifier (e.g. ``org.broad.scrnaseq``).
          Globally unique; serves as the namespace for ``provided_by``
          annotation injection (sec10 §10.10 invariant 7).
      name:
        range: string
        required: true
        description: >-
          Short, filesystem-safe slug. Becomes the ``default_prefix`` of
          the schema fragment at merge time. Must not collide with any
          installed prefix.
      version:
        range: string
        required: true
        description: >-
          Opaque version slug. SemVer is recommended in user docs but not
          enforced by Hippo (parallels the Reference Loader convention,
          D2.14.C).
      description:
        range: string
        required: false
        description: Human-readable, one paragraph.
      author:
        range: RecipeAuthor
        required: false
        inlined: true
        description: >-
          Optional sub-object carrying contact metadata for the recipe
          author. Modelled as a separate class (rather than a free-form
          dict) so closed-schema validation can enforce its shape.
      license:
        range: string
        required: false
        description: SPDX identifier.
      created_at:
        range: datetime
        required: true
        description: ISO 8601 UTC instant the recipe was authored.
      hippo_version:
        range: string
        required: true
        description: >-
          PEP 440 version specifier (e.g. ``">=0.3,<0.5"``). Parsed at
          install time with ``packaging.specifiers.SpecifierSet``. Import
          fails with ``RecipeVersionIncompatibleError`` when the running
          Hippo version is excluded.
      source:
        range: string
        required: false
        description: >-
          Author-declared canonical origin URI (e.g. a Zenodo DOI URL).
          Metadata only — Hippo NEVER fetches from this field. Distinct
          from per-``RecipeRef.source`` and per-installed ``source`` —
          the three may legitimately disagree.
      parent:
        range: RecipeRef
        required: false
        inlined: true
        description: >-
          Optional ``RecipeRef`` pointing at the parent recipe this one
          extends. Present on recipes produced by ``hippo recipe extend``.
          Auto-resolved as a dependency at install time (sec10 §10.4.4);
          a child manifest does NOT need to also list its parent in
          ``requires.recipes``.
      requires:
        range: RecipeRequires
        required: false
        inlined: true
        description: >-
          Optional dependency block carrying peer recipes and required
          Reference Loaders. See ``RecipeRequires``.

  RecipeAuthor:
    description: >-
      Contact metadata for the recipe author. Inlined under
      ``RecipeManifest.author``. All slots optional; the class exists so
      closed-schema validation rejects unknown keys.
    attributes:
      name:
        range: string
        required: false
      email:
        range: string
        required: false
      organization:
        range: string
        required: false

  RecipeRequires:
    description: >-
      Dependency block carrying peer recipes (``recipes``) and Reference
      Loader preconditions (``reference_loaders``). Inlined under
      ``RecipeManifest.requires``. Both slots optional and default to
      empty.

      ``reference_loaders`` entries are pin strings of the form
      ``name==version``; v1 treats them as PRECONDITIONS only — Hippo
      checks the named Reference Loader is installed at the declared
      version and raises ``RecipeRequiresUnsatisfiedError`` otherwise.
      It does NOT install Reference Loaders as a side effect of recipe
      import (sec10 §10.4.5).
    attributes:
      recipes:
        range: RecipeRef
        multivalued: true
        inlined: true
        inlined_as_list: true
        required: false
        description: >-
          Peer recipe dependencies (siblings, not ancestors). Merged
          bottom-up before the depending recipe (sec10 §10.4.4).
      reference_loaders:
        range: string
        multivalued: true
        required: false
        description: >-
          Pin strings (``name==version``). Treated as preconditions, not
          installed transitively (sec10 §10.4.5).

  RecipeRef:
    description: >-
      Typed reference to a recipe. Reused as ``RecipeManifest.parent``,
      each entry of ``RecipeManifest.requires.recipes``, and the shape
      stored in ``hippo_meta.installed_recipes``. See sec10 §10.3.3 for
      the per-field semantics.

      ``digest`` is REQUIRED when ``source`` is an ``https:`` URI and
      optional (but always recorded) for ``file:`` sources. LinkML's
      ``required:`` cannot express this conditional invariant — the
      install path enforces it (sec10 §10.4.1, §10.6.1, invariant 4).
    attributes:
      id:
        range: string
        required: true
        description: Matches ``RecipeManifest.id`` of the referenced recipe.
      version:
        range: string
        required: true
        description: Matches ``RecipeManifest.version``.
      source:
        range: string
        required: true
        description: >-
          ``file:`` URI, bare path, or ``https:`` URI. Relative paths in
          a manifest resolve against the importing recipe's directory;
          relative paths in a lockfile resolve against the lockfile's
          directory (sec10 §10.3.3).
      digest:
        range: string
        required: false
        description: >-
          sha256 canonical-content-hash digest (sec10 §10.4.3),
          lowercase hex, optionally prefixed ``sha256:``. Required at
          install time for ``https:`` sources; computed and recorded
          for ``file:`` sources.
