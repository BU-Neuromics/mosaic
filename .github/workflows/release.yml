name: Release

# Release pipeline (DataHelix 1.0 epic P1.1, issue #97).
#
# Pushing a `vX.Y.Z` tag — or dispatching this workflow with that tag name,
# which creates the tag at the dispatched ref — produces:
#   - a wheel + sdist, attached to a GitHub Release (and published to PyPI
#     when the `PYPI_PUBLISH` repository variable is "true" — see RELEASING.md
#     for the distribution-name decision that gates this),
#   - a digest-addressed image at ghcr.io/bu-neuromics/hippo,
#   - an `image-digest.json` release asset carrying the image digest for the
#     DataHelix certification workflow / composition.lock.json bump bot.

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (vX.Y.Z; must match pyproject.toml). Created at the dispatched ref if it doesn't exist."
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}

jobs:
  validate:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Check tag matches pyproject.toml version
        id: version
        run: |
          TAG_NAME="${{ github.event.inputs.tag || github.ref_name }}"
          TAG_VERSION="${TAG_NAME#v}"
          PKG_VERSION=$(python3 -c 'import tomllib; print(tomllib.load(open("pyproject.toml","rb"))["project"]["version"])')
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag $TAG_NAME does not match pyproject.toml version $PKG_VERSION"
            exit 1
          fi
          echo "version=$PKG_VERSION" >> "$GITHUB_OUTPUT"

  build:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4

      - name: Build wheel and sdist
        run: uv build

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  image:
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      digest: ${{ steps.push.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/bu-neuromics/hippo
          # Explicit version (not type=semver) so workflow_dispatch runs, which
          # aren't on a tag ref, tag the image identically.
          tags: |
            type=raw,value=${{ needs.validate.outputs.version }}
            type=raw,value=latest

      - uses: docker/build-push-action@v6
        id: push
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ needs.validate.outputs.version }}
            REVISION=${{ github.sha }}

  release:
    needs: [validate, build, image]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Extract release notes from CHANGELOG.md
        run: |
          python3 scripts/extract_release_notes.py "${{ needs.validate.outputs.version }}" > release-notes.md
          cat release-notes.md

      - name: Write image-digest.json
        run: |
          python3 - <<'EOF'
          import json
          version = "${{ needs.validate.outputs.version }}"
          digest = "${{ needs.image.outputs.digest }}"
          image = "ghcr.io/bu-neuromics/hippo"
          json.dump(
              {
                  "component": "hippo",
                  "repo": "BU-Neuromics/hippo",
                  "version": version,
                  "image": image,
                  "digest": digest,
                  "ref": f"{image}@{digest}",
              },
              open("image-digest.json", "w"),
              indent=2,
          )
          EOF
          cat image-digest.json

      - uses: softprops/action-gh-release@v2
        with:
          # On workflow_dispatch the tag doesn't exist yet — this creates it
          # at the checked-out ref.
          tag_name: v${{ needs.validate.outputs.version }}
          name: v${{ needs.validate.outputs.version }}
          body_path: release-notes.md
          files: |
            dist/*
            image-digest.json

  pypi:
    # Gated until a trusted publisher is configured for the datahelix-mosaic
    # distribution — see RELEASING.md.
    # Flip on by setting the repository variable PYPI_PUBLISH to "true".
    if: vars.PYPI_PUBLISH == 'true'
    needs: [validate, build]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - uses: pypa/gh-action-pypi-publish@release/v1
