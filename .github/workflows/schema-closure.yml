name: Schema Closure

# sec11 §11.6.3 — CI guard: validates the fully merged schema closure is
# structurally coherent on every PR and push to main.
#
# Two gates:
#   1. `mosaic validate --schema` on hippo_core (fast structural load check).
#   2. `scripts/check_schema_closure.py` — deeper guard:
#        a. Positive: valid synthetic fragments merge without error.
#        b. Negative: incoherent fragment (dangling is_a) is caught and the
#           offending class is named.  This proves the guard is live.
#        c. Bundle: Bundle.from_manifest().to_requires() pins are exact-version
#           and the merged closure for those pins validates.
#
# Why class_induced_slots and not only `mosaic validate`?
#   `mosaic validate --schema` calls SchemaRegistry.from_path which loads the
#   schema but does not traverse every class's inheritance chain.  Iterating
#   class_induced_slots on every class reliably surfaces a dangling is_a or
#   missing-range class, whereas the CLI exits 0 for those cases.

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: schema-closure-${{ github.ref }}
  cancel-in-progress: true

jobs:
  schema-closure:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv pip install --system -e ".[dev]"

      - name: Gate 1 – mosaic validate hippo_core
        run: |
          mosaic validate --schema src/mosaic/schemas/hippo_core.yaml
          echo "hippo_core schema passed mosaic validate"

      - name: Gate 2 – merged-closure integrity check
        run: python scripts/check_schema_closure.py
