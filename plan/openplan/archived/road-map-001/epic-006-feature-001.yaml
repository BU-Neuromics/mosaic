acceptance_criteria:
- Given the app factory function is called with valid router definitions, when it
  creates a FastAPI instance, then all defined routers must be successfully mounted
  on the application object
- Given an endpoint that raises a ValidationError during request processing, when
  the request is made to that endpoint, then the response must return HTTP 422 status
  code with proper error details in the JSON body
- Given an endpoint that raises EntityNotFoundError during request processing, when
  the request is made to that endpoint, then the response must return HTTP 404 status
  code with proper error message in the JSON body
- Given the app factory is called without any router definitions, when it creates
  a FastAPI instance, then the application should be created successfully without
  any mounted routers
- Given an endpoint that raises a generic Exception, when the request is made to that
  endpoint, then the response must return HTTP 500 status code with proper error message
  in the JSON body
complexity: low
dependencies: []
description: Creates a FastAPI application factory that mounts all routers and includes
  global error handlers for consistent API behavior.
id: epic-006-feature-001
spec_ready: true
title: FastAPI App Factory with Global Error Handlers
