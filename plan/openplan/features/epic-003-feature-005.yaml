acceptance_criteria:
- Given a write operation with all required fields populated correctly, when the validation
  logic is executed, then the operation should complete successfully with no validation
  errors
- Given a write operation missing a required field, when the validation logic is executed,
  then the operation should fail with a clear error message indicating the missing
  field and its expected data type
- Given a write operation referencing a non-existent entity in a foreign key field,
  when the validation logic is executed, then the operation should fail with an appropriate
  reference error detailing the invalid relationship
- Given a write operation containing invalid data types in fields (e.g., string in
  numeric field), when the validation logic is executed, then the operation should
  fail with specific error messages identifying the problematic field and expected
  data type
- Given a write operation with valid data that exceeds length or size constraints,
  when the validation logic is executed, then the operation should fail with an appropriate
  constraint violation error specifying the exceeded limit
complexity: medium
dependencies:
