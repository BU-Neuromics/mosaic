acceptance_criteria:
- Given a client makes a GET request to /entities endpoint with valid authentication
  headers, when the server processes the request, then it returns HTTP 200 status
  code with a JSON array of entity objects containing id, name, type, and metadata
  fields
- Given a client makes a POST request to /ingest endpoint with valid JSON payload
  containing entity data, when the server processes the request, then it returns HTTP
  201 status code with the created entity object including all input fields plus generated
  timestamp and id
- Given a client makes a POST request to /ingest endpoint with missing required fields
  in the JSON payload, when the server processes the request, then it returns HTTP
  422 status code with validation error message indicating which fields are missing
- Given a client makes a GET request to /entities endpoint without authentication
  headers, when the server processes the request, then it returns HTTP 401 status
  code with error message "Unauthorized access"
- Given a client makes a POST request to /ingest endpoint with malformed JSON in the
  request body, when the server processes the request, then it returns HTTP 400 status
  code with error message "Invalid JSON format"
- Given a client makes a GET request to /entities endpoint with query parameters for
  filtering, when the server processes the request, then it returns HTTP 200 status
  code with filtered entity results matching the provided criteria
complexity: high
dependencies: []
description: Implements core entity routers including entity, history, availability,
  supersede, relationship, external_id, search, ingest, and schema routers.
